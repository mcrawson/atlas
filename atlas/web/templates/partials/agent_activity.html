{% if activity %}
    {% for event in activity[:8] %}
    <div class="timeline-item">
        <div class="timeline-avatar">
            <img src="/static/images/agents/{{ event.agent }}-{% if event.agent == 'egon' %}planning{% elif event.agent == 'gadget' %}fixing{% else %}reviewing{% endif %}.png" alt="{{ event.agent }}">
        </div>
        <div class="timeline-content">
            <div class="timeline-header">
                <span class="timeline-agent">{{ event.agent|title }}</span>
                <span class="timeline-action">{{ event.action }}</span>
            </div>
            <p class="timeline-task">{{ event.task[:60] }}{% if event.task|length > 60 %}...{% endif %}</p>
            <span class="timeline-time">{{ event.time_ago }}</span>
        </div>
        <div class="timeline-status">
            <span class="status-dot {{ event.status }}"></span>
        </div>
    </div>
    {% endfor %}
{% else %}
    <div class="timeline-empty">
        <p>No recent activity. Execute a task to get started.</p>
    </div>
{% endif %}
